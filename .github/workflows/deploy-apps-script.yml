# Pushes the apps-script/ folder to the live Apps Script project whenever it changes on main,
# so the code in GitHub and the code in the Apps Script editor never drift apart.
#
# One-time setup (details in apps-script/SETUP.md, "Keeping Apps Script in sync"):
#   1. Put your Apps Script project's Script ID in apps-script/.clasp.json
#   2. Run `clasp login` locally once, then save the contents of ~/.clasprc.json
#      as a repository secret named CLASPRC_JSON (Settings > Secrets and variables > Actions).
#
# This pushes the script's code (like pressing Save in the editor). It deliberately does NOT also
# bump the live dashboard web app deployment: `clasp deploy --deploymentId <id>` was tried for
# that and turned out to silently strip the deployment's "Web app" configuration down to
# library-only, breaking the live /exec URL — apparently the Apps Script API's deployments.update
# (which is what clasp deploy calls) doesn't reliably preserve entry-point config the way the
# Apps Script UI's own "Deploy" button does. So: after a push, still bump the version manually —
# Deploy > Manage deployments > pencil icon > confirm Web app / Execute as Me / access setting >
# New version > Deploy. See SETUP.md, "Keeping Apps Script in sync," for the full explanation.

name: Deploy to Apps Script

on:
  push:
    branches: [main]
    paths:
      - 'apps-script/**'
  workflow_dispatch:

jobs:
  push-to-apps-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "::error::The CLASPRC_JSON repository secret is not set. Run 'clasp login' locally and save ~/.clasprc.json as the CLASPRC_JSON secret. See apps-script/SETUP.md."
            exit 1
          fi
          printf '%s' "$CLASPRC_JSON" > ~/.clasprc.json

      - name: Push code to Apps Script
        working-directory: apps-script
        run: clasp push -f
